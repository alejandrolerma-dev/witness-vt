AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Witness — Anonymous Cognito User Pool and Identity Pool.
  Zero PII: no required attributes, no username/password, unauthenticated identities only.

Parameters:
  ApiGatewayArn:
    Type: String
    Description: >
      ARN of the API Gateway REST API (used to scope the unauthenticated IAM role).
      Format: arn:aws:execute-api:<region>:<account-id>:<api-id>/*/POST/session
    Default: "*"
    # Override this after API Gateway is created (Task 4).

Resources:

  # ─────────────────────────────────────────────
  # Cognito User Pool — witness-anon-pool
  # ─────────────────────────────────────────────
  WitnessUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: witness-anon-pool
      # No sign-in identifiers — identity pool flow only
      UsernameAttributes: []
      # No required attributes — zero PII
      Schema: []
      # Self-registration disabled
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      # MFA disabled
      MfaConfiguration: "OFF"
      # Email/phone verification disabled
      AutoVerifiedAttributes: []
      # No password policy needed (no user/pass sign-in)
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      # Token validity
      TokenValidityUnits:
        IdToken: hours
        RefreshToken: days
        AccessToken: hours
      UserPoolAddOns:
        AdvancedSecurityMode: "OFF"

  # App client — no secret, used by identity pool
  WitnessUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: witness-anon-client
      UserPoolId: !Ref WitnessUserPool
      GenerateSecret: false
      # Token validity
      IdTokenValidity: 1
      RefreshTokenValidity: 1
      AccessTokenValidity: 1
      TokenValidityUnits:
        IdToken: hours
        RefreshToken: days
        AccessToken: hours
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  # ─────────────────────────────────────────────
  # Cognito Identity Pool — witness-anon-identity-pool
  # ─────────────────────────────────────────────
  WitnessIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: witness-anon-identity-pool
      # Core requirement: allow unauthenticated (guest) identities
      AllowUnauthenticatedIdentities: true
      # Link to the user pool above
      CognitoIdentityProviders:
        - ClientId: !Ref WitnessUserPoolClient
          ProviderName: !Sub "cognito-idp.${AWS::Region}.amazonaws.com/${WitnessUserPool}"
          ServerSideTokenCheck: false

  # ─────────────────────────────────────────────
  # IAM Role — Unauthenticated (guest) identity
  # Minimal: only POST /session on API Gateway
  # ─────────────────────────────────────────────
  WitnessUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: witness-cognito-unauth-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "cognito-identity.amazonaws.com:aud": !Ref WitnessIdentityPool
              "ForAnyValue:StringLike":
                "cognito-identity.amazonaws.com:amr": unauthenticated
      Policies:
        - PolicyName: witness-unauth-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowPostSession
                Effect: Allow
                Action: execute-api:Invoke
                Resource: !Ref ApiGatewayArn

  # Attach roles to identity pool
  WitnessIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref WitnessIdentityPool
      Roles:
        unauthenticated: !GetAtt WitnessUnauthRole.Arn

# ─────────────────────────────────────────────
# Outputs — referenced by other stacks/tasks
# ─────────────────────────────────────────────
Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref WitnessUserPool
    Export:
      Name: WitnessUserPoolId

  UserPoolClientId:
    Description: Cognito User Pool App Client ID
    Value: !Ref WitnessUserPoolClient
    Export:
      Name: WitnessUserPoolClientId

  IdentityPoolId:
    Description: Cognito Identity Pool ID
    Value: !Ref WitnessIdentityPool
    Export:
      Name: WitnessIdentityPoolId

  UnauthRoleArn:
    Description: IAM Role ARN for unauthenticated identities
    Value: !GetAtt WitnessUnauthRole.Arn
    Export:
      Name: WitnessUnauthRoleArn
